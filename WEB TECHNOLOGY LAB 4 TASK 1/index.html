<!DOCTYPE html>
<html>
<head>
<title>Enhanced Calculator</title>
<style>
body{
    font-family: Arial;
    text-align: center;
    background-color: #f2f2f2;
}
.container{
    margin-top: 50px;
}
input{
    padding: 8px;
    margin: 5px;
}
button{
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
}
#result{
    font-weight: bold;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
<h2>Enhanced Calculator</h2>

<input type="number" id="num1" placeholder="Enter First Number"><br>
<input type="number" id="num2" placeholder="Enter Second Number"><br>

<button onclick="calculate('+')">Add</button>
<button onclick="calculate('-')">Subtract</button>
<button onclick="calculate('*')">Multiply</button>
<button onclick="calculate('/')">Divide</button>

<h3 id="result"></h3>
</div>

<script>
function calculate(operator){

    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;
    let result = document.getElementById("result");

    if(n1 === "" || n2 === ""){
        result.innerHTML = "Error: Please enter both numbers";
        result.style.color = "red";
        return;
    }

    n1 = Number(n1);
    n2 = Number(n2);

    let output;

    switch(operator){
        case '+': output = n1 + n2; break;
        case '-': output = n1 - n2; break;
        case '*': output = n1 * n2; break;
        case '/':
            if(n2 === 0){
                result.innerHTML = "Error: Cannot divide by zero";
                result.style.color = "red";
                return;
            }
            output = n1 / n2;
            break;
    }

    result.innerHTML = "Result = " + output;
    result.style.color = "green";
}
</script>

</body>
</html>
